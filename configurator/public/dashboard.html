<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurator Dashboard</title>
<style>
/* ===== Body & Fonts ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #121212;
    color: #fff;
    overflow-x: hidden;
}

/* ===== Navbar ===== */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #1e1e1e;
    box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    position: relative;
}

.navbar span {
    font-weight: 500;
    font-size: 18px;
}

.navbar a {
    padding: 8px 16px;
    border-radius: 6px;
    background: #00bcd4;
    color: #121212;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}
.navbar a:hover { background: #0097a7; }

/* ===== Upload Button Top Right ===== */
.upload-btn {
    position: absolute;
    right: 30px;
    top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #00bcd4;
    color: #121212;
    cursor: pointer;
    font-weight: 500;
    transition: 0.3s;
}
.upload-btn:hover { background: #0097a7; }

/* ===== Main Content ===== */
.instructions-container {
    padding: 20px 30px;
}

/* ===== Instructions Grid ===== */
#instructions-list {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-top: 20px;
}

@media (max-width: 1200px) { #instructions-list { grid-template-columns: repeat(3,1fr); } }
@media (max-width: 900px) { #instructions-list { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 600px) { #instructions-list { grid-template-columns: 1fr; } }

#instructions-list .card {
    background: #2c2c2c;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: 0.3s;
    position: relative;
}
#instructions-list .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.7);
}

#instructions-list .card p { font-size: 14px; margin: 4px 0; }

#instructions-list .card img {
    width: 100%; height: auto; margin-top: 10px; border-radius: 8px; display: block;
}

/* Delete button in card */
.card .delete-btn {
    position: absolute; top: 10px; right: 10px;
    background: #f44336; color: #fff; border: none;
    padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
    transition: 0.3s;
}
.card .delete-btn:hover { background: #d32f2f; }

/* ===== Sliding Upload Panel ===== */
.upload-panel {
    width: 50%; max-width: 500px;
    background: #1e1e1e; position: fixed;
    top: 0; right: 0; height: 100%;
    padding: 20px 30px;
    box-shadow: -2px 0 10px rgba(0,0,0,0.5);
    transform: translateX(100%);
    transition: transform 0.4s ease;
    z-index: 100; overflow-y: auto;
}
.upload-panel.show { transform: translateX(0); }
.upload-panel h3 { margin-top: 0; }

/* ===== Form Styling ===== */
#upload-form label { display: block; margin: 10px 0 5px; font-weight: 500; }
#upload-form input[type="text"],
#upload-form input[type="number"],
#upload-form input[type="file"] {
    width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333;
    background: #2c2c2c; color: #fff; margin-bottom: 10px;
}
#upload-form button {
    margin-top: 10px; width: 100%; padding: 12px; border: none;
    border-radius: 8px; background: #00bcd4; color: #121212; font-weight: 500;
    cursor: pointer; transition: 0.3s;
}
#upload-form button:hover { background: #0097a7; }
#close-panel { background: #f44336; color: #fff; margin-bottom: 15px; }
#close-panel:hover { background: #d32f2f; }

</style>
</head>
<body>

<div class="navbar">
    <span>Configurator Dashboard</span>
    <a href="index.html">Logout</a>
    <button class="upload-btn" id="toggle-upload">Upload Step</button>
</div>

<div class="instructions-container">
    <h3>Instructions</h3>
    <div id="instructions-list"></div>
</div>

<div class="upload-panel" id="upload-panel">
    <button id="close-panel">Close</button>
    <h3>Upload Step</h3>
    <form id="upload-form" enctype="multipart/form-data">
        <label for="ass">ASS ID:</label>
        <input type="text" id="ass" name="ass_id" placeholder="Enter ASS ID" required>

        <label for="step">Step No:</label>
        <input type="number" id="step" name="step_no" placeholder="Enter Step No" required>

        <label for="desc">Description:</label>
        <input type="text" id="desc" name="description" placeholder="Enter Description" required>

        <label for="img">Image:</label>
        <input type="file" id="img" name="image" required>

        <button type="submit">Upload</button>
    </form>
</div>

<script>
const toggleBtn = document.getElementById('toggle-upload');
const closeBtn = document.getElementById('close-panel');
const uploadPanel = document.getElementById('upload-panel');

toggleBtn.addEventListener('click', ()=> uploadPanel.classList.add('show'));
closeBtn.addEventListener('click', ()=> uploadPanel.classList.remove('show'));
</script>

<script src="script.js"></script>

</body>
</html>
