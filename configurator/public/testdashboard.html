<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard]</title>

<link href="https://fonts.googleapis.com/css?family=Lato:400,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
  --sidebar-bg:#242e42;
  --sidebar-hover:#1d2636;
  --sidebar-text:#dde9f8;
  --heading-color:#7889a4;
  --content-bg:#f4f6fb;
  --content-text:#222;
  --blue:#00b9eb;
  --radius:8px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Lato",sans-serif;
background:var(--content-bg);
}

/* TOP NAVBAR */

.top-navbar{
width:100%;
height:60px;
background:#2c3e50;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
color:white;
position:fixed;
top:0;
left:0;
z-index:1000;
}

.nav-left,.nav-right{
display:flex;
align-items:center;
gap:20px;
}

.nav-left div{
cursor:pointer;
}

/* USER AVATAR & DROPDOWN */

.user-avatar {
  position: relative;
  cursor: pointer;
  display: flex;
  align-items: center;
}

.user-avatar img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  border: 2px solid white;
}

.user-avatar .dropdown {
  display: none;
  position: absolute;
  top: 45px;
  right: 0;
  background: white;
  color: #222;
  border-radius: 5px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  list-style: none;
  min-width: 120px;
  z-index: 1001;
}

.user-avatar .dropdown li {
  padding: 10px 15px;
}

.user-avatar .dropdown li:hover {
  background: #00b9eb;
  color: white;
}

#loginBtn {
  background: #00b9eb;
  border: none;
  color: white;
  padding: 8px 15px;
  border-radius: 5px;
  cursor: pointer;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:var(--sidebar-bg);
position:fixed;
top:60px;
left:0;
height:100%;
color:var(--sidebar-text);
padding-top:20px;
}

.sidebar ul{
list-style:none;
}

.sidebar .menu-heading h3{
padding:10px 20px;
font-size:12px;
color:var(--heading-color);
}

.sidebar a{
display:flex;
align-items:center;
padding:12px 20px;
color:var(--sidebar-text);
text-decoration:none;
}

.sidebar a:hover{
background:var(--sidebar-hover);
color:var(--blue);
}

.sidebar i{
margin-right:10px;
}

/* CONTENT */

.page-content{
margin-left:220px;
padding:80px 30px;
}

/* CARDS */

.dashboard-cards{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:40px;
}

.card{
background:white;
padding:20px;
border-radius:var(--radius);
box-shadow:0 3px 8px rgba(0,0,0,0.05);
min-width:220px;
text-align:center;
}

.card svg{
width:150px;
height:150px;
display:block;
margin:auto;
}

.card circle{
fill:none;
stroke-width:8;
stroke-linecap:round;
stroke-dasharray:628;
stroke-dashoffset:628;
animation:loopDraw 3s linear infinite, spin 8s linear infinite;
transform-origin:50% 50%;
}

.red{stroke:#ff4444;}
.green{stroke:#44ff44;}
.blue{stroke:#4488ff;}

@keyframes loopDraw{
0%{stroke-dashoffset:628;}
50%{stroke-dashoffset:0;}
100%{stroke-dashoffset:628;}
}

@keyframes spin{
from{transform:rotate(0);}
to{transform:rotate(360deg);}
}

.card h3{
margin-top:10px;
}

/* REPORT */

.report-section{
background:white;
padding:25px;
border-radius:var(--radius);
box-shadow:0 3px 10px rgba(0,0,0,0.08);
margin-bottom:40px;
}

.chart{
display:flex;
justify-content:space-between;
align-items:flex-end;
height:300px;
margin-top:30px;
}

.bar{
width:35px;
background:linear-gradient(to top,#00b9eb,#ccefff);
border-radius:6px;
position:relative;
}

.bar span{
position:absolute;
bottom:-25px;
font-size:12px;
}

.bar::after{
content:attr(data-value) "%";
position:absolute;
top:-20px;
font-size:12px;
}

/* MODEL LIST */

.create-btn{
padding:10px 15px;
background:#00b9eb;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
margin-bottom:15px;
}

#modelList{
list-style:none;
}

#modelList li{
background:#f4f6fb;
padding:10px;
margin:5px 0;
border-radius:5px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:8px;
width:300px;
text-align:center;
}

.modal-content input{
width:100%;
padding:10px;
margin:10px 0;
}

.modal-content button{
padding:8px 15px;
margin:5px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="top-navbar">

<div class="nav-left">

<i class="fa-solid fa-user-circle" style="font-size:28px;"></i>



<div id="assemblyBtn">Assembly Line</div>


<div>Plant Info</div>

<div href="#">Dashboard</div>
</div>


<div class="nav-right">
  <!-- User avatar -->
  <div class="user-avatar" onclick="toggleMenu()">
    <img src="photo_2026-03-22_20-08-06.jpg" alt="Admin" />
    <ul class="dropdown">
      <li><a href="#">Profile</a></li>
      <li><a href="index.html" onclick="logout()">Logout</a></li>
    </ul>
  </div>

  <!-- Login button when logged out -->
  <button id="loginBtn" onclick="login()" style="display:none;">Login</button>
</div>

</div>

<!-- SIDEBAR -->

<aside class="sidebar">

<ul>

<li class="menu-heading"><h3>Admin Menu</h3></li>

<li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Work instruction</a></li>

<li><a href="admin.html"><i class="fa-solid fa-users"></i> User Management</a></li>

</ul>

</aside>

<!-- CONTENT -->

<section class="page-content">

<!-- CARDS -->

<section class="dashboard-cards">

<div class="card">

<svg viewBox="0 0 220 220">

<circle class="red" cx="110" cy="110" r="100"></circle>

<circle class="green" cx="110" cy="110" r="80"></circle>

<circle class="blue" cx="110" cy="110" r="60"></circle>

</svg>

<h3>Users</h3>

</div>

<div class="card">

<svg viewBox="0 0 220 220">

<circle class="red" cx="110" cy="110" r="100"></circle>

<circle class="green" cx="110" cy="110" r="80"></circle>

<circle class="blue" cx="110" cy="110" r="60"></circle>

</svg>

<h3>Revenue</h3>

</div>

<div class="card">

<svg viewBox="0 0 220 220">

<circle class="red" cx="110" cy="110" r="100"></circle>

<circle class="green" cx="110" cy="110" r="80"></circle>

<circle class="blue" cx="110" cy="110" r="60"></circle>


</svg>

<h3>Visits</h3>

</div>

</section>

<!-- CHART -->

<section class="report-section">

<h2>Monthly Report</h2>

<div class="chart">

<div class="bar" style="height:40%" data-value="40"><span>Jan</span></div>
<div class="bar" style="height:60%" data-value="60"><span>Feb</span></div>
<div class="bar" style="height:30%" data-value="30"><span>Mar</span></div>
<div class="bar" style="height:70%" data-value="70"><span>Apr</span></div>
<div class="bar" style="height:50%" data-value="50"><span>May</span></div>
<div class="bar" style="height:40%" data-value="40"><span>Jun</span></div>
<div class="bar" style="height:60%" data-value="60"><span>Jul</span></div>
<div class="bar" style="height:45%" data-value="45"><span>Aug</span></div>
<div class="bar" style="height:55%" data-value="55"><span>Sep</span></div>
<div class="bar" style="height:65%" data-value="65"><span>Oct</span></div>
<div class="bar" style="height:35%" data-value="35"><span>Nov</span></div>
<div class="bar" style="height:75%" data-value="75"><span>Dec</span></div>

</div>

</section>

<!-- MODEL MODAL -->

<div id="modelModal" class="modal">

<div class="modal-content">

<h2>Create Model</h2>

<input type="text" id="modelName" placeholder="Enter Model Name">

<button onclick="createModel()">Create</button>

<button onclick="closeModal()">Cancel</button>

</div>

</div>

<script>

// Modal logic
const modal=document.getElementById("modelModal")

document.getElementById("assemblyBtn").onclick=function(){
openModal()
}

function openModal(){
modal.style.display="flex"
}

function closeModal(){
modal.style.display="none"
}

function createModel(){
let name=document.getElementById("modelName").value
if(name===""){
alert("Enter Model Name")
return
}
let li=document.createElement("li")
li.textContent=name
document.getElementById("modelList").appendChild(li)
document.getElementById("modelName").value=""
closeModal()
}

// Login/Logout logic
let isLoggedIn = true;

function toggleMenu() {
  const dropdown = document.querySelector('.user-avatar .dropdown');
  dropdown.style.display = (dropdown.style.display === 'block') ? 'none' : 'block';
}

function login() {
  isLoggedIn = true;
  updateNavbar();
}

function logout() {
  isLoggedIn = false;
  updateNavbar();
}

function updateNavbar() {
  const avatar = document.querySelector('.user-avatar');
  const loginBtn = document.getElementById('loginBtn');
  const dropdown = document.querySelector('.user-avatar .dropdown');
  dropdown.style.display = 'none'; // hide menu by default

  if(isLoggedIn){
    avatar.style.display = 'flex';
    loginBtn.style.display = 'none';
  } else {
    avatar.style.display = 'none';
    loginBtn.style.display = 'block';
  }
}

// Initialize navbar state
updateNavbar();

</script>

</body>
</html>
